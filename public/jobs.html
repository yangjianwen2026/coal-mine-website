<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>招聘信息 - 煤矿资讯招聘网</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="container">
      <div class="logo">
        <h1>⛏️ 煤矿资讯招聘网</h1>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="news.html">资讯</a></li>
        <li><a href="jobs.html" class="active">招聘</a></li>
        <li><a href="index.html#contact">联系我们</a></li>
      </ul>
    </div>
  </nav>

  <!-- 页面标题 -->
  <header class="page-header">
    <div class="container">
      <h2>💼 招聘信息</h2>
      <p>找到最适合您的煤矿行业职位</p>
    </div>
  </header>

  <!-- 主要内容 -->
  <main class="container">
    <!-- 筛选和搜索 -->
    <section class="filter-section">
      <div class="filter-group">
        <label>地点筛选：</label>
        <select id="locationFilter" onchange="filterJobs()">
          <option value="">全部地点</option>
          <option value="内蒙古">内蒙古</option>
          <option value="山西">山西</option>
          <option value="陕西">陕西</option>
          <option value="山东">山东</option>
          <option value="河南">河南</option>
          <option value="河北">河北</option>
          <option value="黑龙江">黑龙江</option>
        </select>
      </div>
      <div class="search-group">
        <input type="text" id="searchInput" placeholder="搜索职位或公司...">
        <button onclick="searchJobs()">搜索</button>
      </div>
    </section>

    <!-- 招聘列表 -->
    <section class="jobs-list" id="jobsList">
      <p class="loading">加载中...</p>
    </section>

    <!-- 分页 -->
    <section class="pagination" id="pagination">
    </section>
  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-section">
          <h3>关于我们</h3>
          <p>煤矿资讯招聘网致力于为煤矿行业从业者提供最新的行业资讯和招聘信息。</p>
        </div>
        <div class="footer-section">
          <h3>联系方式</h3>
          <p>📧 邮箱：contact@coalmine.com</p>
          <p>📞 电话：400-123-4567</p>
        </div>
        <div class="footer-section">
          <h3>快速链接</h3>
          <ul>
            <li><a href="news.html">行业资讯</a></li>
            <li><a href="jobs.html">招聘信息</a></li>
            <li><a href="#">政策法规</a></li>
            <li><a href="#">安全培训</a></li>
          </ul>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 煤矿资讯招聘网. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="jobs.js"></script>
</body>
</html>
