<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>资讯列表 - 煤矿资讯招聘网</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="container">
      <div class="logo">
        <h1>⛏️ 煤矿资讯招聘网</h1>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="news.html" class="active">资讯</a></li>
        <li><a href="jobs.html">招聘</a></li>
        <li><a href="index.html#contact">联系我们</a></li>
      </ul>
    </div>
  </nav>

  <!-- 页面标题 -->
  <header class="page-header">
    <div class="container">
      <h2>📰 行业资讯</h2>
      <p>了解最新的煤矿行业动态、政策法规、安全知识</p>
    </div>
  </header>

  <!-- 主要内容 -->
  <main class="container">
    <!-- 筛选和搜索 -->
    <section class="filter-section">
      <div class="filter-group">
        <label>分类筛选：</label>
        <select id="categoryFilter" onchange="filterNews()">
          <option value="">全部分类</option>
          <option value="政策法规">政策法规</option>
          <option value="行业动态">行业动态</option>
          <option value="安全知识">安全知识</option>
          <option value="技术文章">技术文章</option>
        </select>
      </div>
      <div class="search-group">
        <input type="text" id="searchInput" placeholder="搜索资讯...">
        <button onclick="searchNews()">搜索</button>
      </div>
    </section>

    <!-- 资讯列表 -->
    <section class="news-list" id="newsList">
      <p class="loading">加载中...</p>
    </section>

    <!-- 分页 -->
    <section class="pagination" id="pagination">
    </section>
  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-section">
          <h3>关于我们</h3>
          <p>煤矿资讯招聘网致力于为煤矿行业从业者提供最新的行业资讯和招聘信息。</p>
        </div>
        <div class="footer-section">
          <h3>联系方式</h3>
          <p>📧 邮箱：contact@coalmine.com</p>
          <p>📞 电话：400-123-4567</p>
        </div>
        <div class="footer-section">
          <h3>快速链接</h3>
          <ul>
            <li><a href="news.html">行业资讯</a></li>
            <li><a href="jobs.html">招聘信息</a></li>
            <li><a href="#">政策法规</a></li>
            <li><a href="#">安全培训</a></li>
          </ul>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 煤矿资讯招聘网. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="news.js"></script>
</body>
</html>
